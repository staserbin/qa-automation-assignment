name: QA Automation Tests

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  api-tests:
    name: API Tests (REST + GraphQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run API tests
        run: mvn clean test -Dgroups=api

      - name: Verify API Allure results
        run: |
          echo "=== API ALLURE RESULTS ==="
          ls -R target/allure-results || true
          echo "RESULT FILES:"
          find target/allure-results -name "*-result.json" | wc -l
          echo "CONTAINER FILES:"
          find target/allure-results -name "*-container.json" | wc -l

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results
          if-no-files-found: error
          retention-days: 7

  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run UI tests
        run: mvn clean test -Dgroups=ui

      - name: Verify UI Allure results
        run: |
          echo "=== UI ALLURE RESULTS ==="
          ls -R target/allure-results || true
          echo "RESULT FILES:"
          find target/allure-results -name "*-result.json" | wc -l
          echo "CONTAINER FILES:"
          find target/allure-results -name "*-container.json" | wc -l

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: target/allure-results
          if-no-files-found: error
          retention-days: 7

  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results

      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results

      - name: Verify merged Allure input
        run: |
          echo "=== MERGED ALLURE RESULTS ==="
          ls -R allure-results || true
          echo "RESULT FILES:"
          find allure-results -name "*-result.json" | wc -l
          echo "CONTAINER FILES:"
          find allure-results -name "*-container.json" | wc -l

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true
          keep_files: false

      - name: Add Allure Report link to summary
        if: always()
        run: |
          echo "### Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Open Allure Report](https://staserbin.github.io/qa-automation-assignment/)" >> $GITHUB_STEP_SUMMARY